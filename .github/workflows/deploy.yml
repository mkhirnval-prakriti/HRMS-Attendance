name: Deploy to VPS

on:
  push:
      branches:
            - master
                  - main

                  jobs:
                    deploy:
                        runs-on: ubuntu-latest

                            steps:
                                  - uses: actions/checkout@v3

                                        - name: Deploy to VPS
                                                uses: appleboy/ssh-action@master
                                                        with:
                                                                  host: ${{ secrets.HOST }}
                                                                            username: ${{ secrets.SSH_USER }}
                                                                                      key: ${{ secrets.SSH_KEY }}
                                                                                                port: ${{ secrets.SSH_PORT }}
                                                                                                          script: |
                                                                                                                      cd /var/www/prakritiherbs.in
                                                                                                                                  git pull origin master
                                                                                                                                              pnpm install
                                                                                                                                                          pnpm build
                                                                                                                                                                      pm2 restart all
