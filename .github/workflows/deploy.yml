name: Deploy CRM to VPS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: crm-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy CRM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.VPS_HOST }}
          username:        ${{ secrets.VPS_USER }}
          key:             ${{ secrets.VPS_SSH_KEY }}
          port:            ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 18m
          script: |
            APP=/var/www/crmprakritiherbs
            ENV_FILE=$APP/.env

            echo "CRM DEPLOY $(date '+%Y-%m-%d %H:%M')"

            # PATH setup
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh" 2>/dev/null || true
            export PATH="/usr/local/bin:/usr/bin:$HOME/.local/bin:$PATH"

            # Load .env into environment (for build)
            if [ -f "$ENV_FILE" ]; then
              set -a
              source "$ENV_FILE"
              set +a
              echo ".env loaded"
            else
              echo "ERROR: $ENV_FILE not found!"
              exit 1
            fi

            # Verify App1 untouched
            API1=$(curl -sf http://localhost:3001/api/healthz 2>/dev/null || echo FAIL)
            echo "App1: $API1"

            # Backup .next/standalone
            BACKUP=/var/backups/crm
            mkdir -p $BACKUP
            TS=$(date +%Y%m%d-%H%M%S)
            tar -czf $BACKUP/pre-$TS.tar.gz $APP/.next/standalone 2>/dev/null || true
            ls -t $BACKUP/*.tar.gz 2>/dev/null | tail -n +4 | xargs rm -f 2>/dev/null || true

            # Git pull
            echo "[1/4] Git pull..."
            cd $APP
            git fetch origin master --quiet
            git reset --hard origin/master --quiet
            git log -1 --oneline

            # Install
            echo "[2/4] npm ci..."
            npm ci --prefer-offline --silent 2>&1 | tail -2

            # Build (env vars already loaded via source above)
            echo "[3/4] Build..."
            BUILD_OUT=$(npm run build 2>&1)
            BUILD_EXIT=$?

            if [ $BUILD_EXIT -ne 0 ]; then
              echo "BUILD FAILED:"
              echo "$BUILD_OUT" | tail -40
              echo "Rolling back..."
              LATEST=$(ls -t $BACKUP/*.tar.gz 2>/dev/null | head -1)
              [ -n "$LATEST" ] && tar -xzf $LATEST -C $APP 2>/dev/null || true
              pm2 restart crmprakritiherbs --update-env 2>/dev/null || true
              exit 1
            fi
            echo "Build OK"

            # Copy standalone server
            cp -r $APP/.next/standalone/. $APP/

            # PM2 restart
            echo "[4/4] PM2 restart..."
            if pm2 describe crmprakritiherbs &>/dev/null; then
              pm2 restart crmprakritiherbs --update-env
            else
              pm2 start $APP/.next/standalone/server.js \
                --name crmprakritiherbs \
                --env NODE_ENV=production \
                --max-memory-restart 400M
            fi
            pm2 save --force

            sleep 6

            # Health checks
            LOCAL=$(curl -sf http://localhost:3000/api/health 2>/dev/null && echo OK || echo FAIL)
            HTTPS=$(curl -sk https://crmprakritiherbs.in/api/health -o /dev/null -w "%{http_code}" 2>/dev/null)
            APP1_A=$(curl -sf http://localhost:3001/api/healthz 2>/dev/null || echo FAIL)

            echo "Local => $LOCAL | HTTPS => $HTTPS | App1 => $APP1_A"
            pm2 list

            if [ "$LOCAL" = "OK" ] && [ "$HTTPS" = "200" ]; then
              echo "DEPLOY COMPLETE: https://crmprakritiherbs.in"
            else
              echo "WARNING: health check - LOCAL=$LOCAL HTTPS=$HTTPS"
              tail -15 /root/.pm2/logs/crmprakritiherbs-error.log 2>/dev/null || true
            fi
